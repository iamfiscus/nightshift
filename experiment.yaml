# Nightshift Experiment Config
# Starting from best known config (MAE=12,271,108 from prior 67 experiments)

dataset: proenfo_gfc12
target: target
horizon: 168
seasonality: 24

covariates:
  include:
    - airtemperature

data:
  context_factor: 16
  num_train_samples: 500
  max_rows: 10000
  train_batch_size: 32
  val_batch_size: 1

training:
  learning_rate: 0.000025
  warmup_steps: 100
  stable_steps: 800
  decay_steps: 100
  max_steps: 1000  # Must equal warmup + stable + decay

evaluation:
  metric: mae
